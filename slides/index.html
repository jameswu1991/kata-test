<!-- 3 SHARED KERNEL -->
<section class="slide" data-notes="A container is NOT a small VM. There's no separate kernel in there.

All the isolation a container gives you — namespaces and cgroups — is just the SAME host kernel keeping bookkeeping about who can see what. Every one of your containers, and every neighbor's, makes system calls directly into that one shared kernel.

That's the red bar. It's a single shared component, and Linux exposes 400+ system calls of attack surface. If untrusted code finds one exploitable bug, it isn't stuck in the container — it's in the kernel, which means the host and every other container on the node.

So the wall between tenants is thinner than the mental model suggests. That's the problem we're solving.">
  <div class="chip" style="color:var(--red)"><span class="dot" style="background:var(--red)"></span>The Problem</div>
  <h2 style="margin-top:14px">Containers share one kernel</h2>

<!-- 4 BLAST RADIUS -->
<section class="slide" data-notes="Let me make that chain concrete — it's a domino effect.

Step one: a bug in the shared kernel — container-escape CVEs are a whole genre.
Step two: untrusted code uses it to escape its container.
Step three: because the kernel IS the host, the attacker now controls the node.
Step four: every other tenant on that node is exposed.

So a single kernel bug isn't a one-container problem — it's a whole-node problem.

The line at the bottom is the framing I keep coming back to: none of us would run a stranger's binary on our laptop as root. A shared-kernel container running untrusted code is uncomfortably close to exactly that.">
  <div class="chip" style="color:var(--red)"><span class="dot" style="background:var(--red)"></span>The Problem</div>
  <h2 style="margin-top:14px">If the kernel is shared, one bug hits everyone</h2>

    <div class="arrow" style="align-self:center">→</div>
    <div class="card" style="flex:1"><div class="ic" style="background:var(--amber)">↑</div><h3 style="margin-top:16px;font-size:18px">Container escape</h3><p class="muted" style="margin-top:8px;font-size:14px">…lets untrusted code break out of its box.</p></div>
    <div class="arrow" style="align-self:center">→</div>
    <div class="card" style="flex:1"><div class="ic" style="background:var(--amber)">⌂</div><h3 style="margin-top:16px;font-size:18px">Host takeover</h3><p class="muted" style="margin-top:8px;font-size:14px">The attacker now owns the node itself.</p></div>

<!-- 6 THE IDEA -->
<section class="slide dark" data-notes="Here's the idea that ties the demo together: give each workload its own kernel. Then a kernel bug is contained to that one pod, instead of reaching the host.

Two fundamentally different ways to do that, and the demo shows BOTH.

Approach A: boot an actual microVM. A real, separate guest kernel inside hardware virtualization — but stripped down so it boots in milliseconds, not 30 seconds. That's Kata Containers, run with two VM monitors: Cloud Hypervisor and Firecracker.

Approach B: no VM at all. Put a second kernel — an ordinary userspace program written in Go — between the app and the host kernel. It intercepts syscalls and services them itself. That's gVisor. No special hardware needed, which matters for where you can run it.

Keep these two lanes in your head — microVM and userspace kernel. The rest of the talk is these two columns.">
  <div class="chip" style="color:var(--teal)"><span class="dot" style="background:var(--teal)"></span>The Idea</div>

      <div style="padding:24px">
        <p style="font-size:16px">Give the pod a genuine guest kernel inside a hardware-virtualized VM — booted in milliseconds.</p>
        <p class="mono" style="color:var(--teal);font-size:14px;margin-top:20px">Kata Containers + Cloud Hypervisor / Firecracker</p>
      </div>
    </div>

        <p class="mono" style="color:var(--violet);font-size:14px;margin-top:20px">gVisor · runsc</p>
      </div>
    </div>
  </div>
</section>

<!-- 8 WHAT WE BUILT -->
<section class="slide" data-notes="The footprint is deliberately tiny — easy to reason about, cheap to run.

One EKS cluster on Kubernetes 1.36. One worker node — a c8i.large. That instance choice is load-bearing: c8i exposes hardware virtualization to the guest — nested virtualization — which is what lets us run KVM, and therefore microVMs, INSIDE an EC2 instance. Most instance types can't do this at all.

On that node, three isolation runtimes side by side. And the whole thing — VPC, EKS control plane, node, IAM — is 57 resources from one terraform apply.

The workflow is genuinely three commands: terraform apply, update-kubeconfig, kubectl apply. That's the entire operator experience.">

<!-- 9 THE PODS -->
<section class="slide" data-notes="The actual workloads. Four pods.

kvm-check is a sanity probe — it verifies /dev/kvm, the KVM device, is present on the node and mapped into the container. That's the foundation the microVM runtimes stand on.

The other three each print a hello and their kernel version. The only meaningful difference between them is one line in the pod spec: runtimeClassName. kata-clh, kata-fc, or runsc. That single field is how a developer opts into stronger isolation — everything else is a normal pod.

Kubernetes sees that name, matches a RuntimeClass, and routes the pod to the right engine. Same YAML shape, three very different execution environments.">

<!-- 10 PROOF -->
<section class="slide" data-notes="This is the payoff — real log output from the three pods, live on the cluster.

Look at the kernel line, that's the whole story. The two Kata pods — Cloud Hypervisor and Firecracker — report kernel 6.18.35. That is a genuine guest kernel inside a microVM; each pod booted its own. gVisor reports 4.19.0-gvisor — a DIFFERENT version string with 'gvisor' baked in, because that's not a real Linux kernel at all, it's gVisor's own reimplementation identifying itself.

So three pods, each genuinely NOT sharing the host's kernel. The claim from the first half, demonstrated end to end.

Along the bottom, kvm-check confirms the foundation: /dev/kvm present on the node and mapped into the container — what makes the microVM path possible on an EC2 instance.

Happy to kubectl logs these live in Q&A — same output.">

<section class="slide" data-notes="Let's trace one pod from YAML to execution.

It starts with the pod declaring runtimeClassName — here, kata-clh. The kubelet matches it to a RuntimeClass object we installed. The RuntimeClass has a 'handler' name. The kubelet passes that handler to containerd.

Key step: containerd has a config that maps each handler to a specific low-level runtime shim. kata-clh and kata-fc both map to the Kata shim — io.containerd.kata.v2 — but with different config files, one pointing at Cloud Hypervisor, the other at Firecracker. runsc maps to a different shim, io.containerd.runsc.v1, which is gVisor.

So the entire 'which isolation engine' decision is a lookup table in containerd's config. The developer picks with one line; the platform wires up the rest. That mapping is written at node boot — which is the next thing.">

<script>
  // move templated slides into the stage
  const stage = document.getElementById('stage');
  const tpl = document.getElementById('slides');
  stage.appendChild(tpl.content.cloneNode(true));
  const slides = [...stage.querySelectorAll('.slide')];
  document.getElementById('tot').textContent = slides.length;

  let i = 0;
  const notes = document.getElementById('notes');
  const notesBody = document.getElementById('notesBody');
  function show(n){
    i = Math.max(0, Math.min(slides.length-1, n));
    slides.forEach((s,k)=>s.classList.toggle('active',k===i));
    document.getElementById('cur').textContent = i+1;
    notesBody.innerHTML = '<p>'+(slides[i].dataset.notes||'').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>';
  }
  function scale(){
    const s = Math.min(window.innerWidth/1280, window.innerHeight/720);
    stage.style.transform = 'scale('+s+')';
  }
  window.addEventListener('resize', scale);
  window.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){show(i+1);e.preventDefault();}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(i-1);e.preventDefault();}
    else if(e.key==='Home'){show(0);}
    else if(e.key==='End'){show(slides.length-1);}
    else if(e.key==='n'||e.key==='N'){notes.classList.toggle('show');}
    else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  });
  // click / tap navigation
  stage.addEventListener('click', e=>{ if(e.clientX < window.innerWidth*0.28) show(i-1); else show(i+1); });
  scale(); show(0);
</script>

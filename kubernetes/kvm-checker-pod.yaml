apiVersion: v1
kind: Pod
metadata:
  name: kvm-check
  namespace: kube-system
spec:
  containers:
  - name: check
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== Checking Host Devices ==="
        if [ -e /host-dev/kvm ]; then
          echo "✅ /dev/kvm exists on the host filesystem!"
        else
          echo "❌ /dev/kvm is MISSING on the host filesystem."
        fi

        echo "=== Checking Container Nested Virtualization ==="
        if [ -e /dev/kvm ]; then
          echo "✅ /dev/kvm is successfully mapped into this container!"
          echo "=== Testing KVM Node Accessibility ==="
          # Try to look for kvm-ok or simple device character test
          ls -l /dev/kvm
        else
          echo "❌ /dev/kvm is missing inside the container context."
        fi
    securityContext:
      privileged: true
    volumeMounts:
    - name: host-dev
      mountPath: /host-dev
  volumes:
  - name: host-dev
    hostPath:
      path: /dev
  restartPolicy: Never

apiVersion: v1
kind: Pod
metadata:
  name: kata-fc-hello
  namespace: kube-system
spec:
  runtimeClassName: kata-fc
  containers:
  - name: hello
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=========================================="
        echo "🚀 Hello from inside Firecracker!"
        echo "=========================================="
        echo "My guest Firecracker microVM kernel is: $(uname -r)"
        echo "=========================================="
  restartPolicy: Never
